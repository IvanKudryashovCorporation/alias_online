name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8

      - name: Lint (flake8 — syntax errors and critical issues)
        run: |
          flake8 server/ services/ screens/ ui/ tests/ \
            --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Syntax check key modules
        run: |
          python -c "import py_compile; py_compile.compile('server/room_server.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('services/room_hub.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('services/profile_store.py', doraise=True)"
          python -c "import py_compile; py_compile.compile('services/email_verification.py', doraise=True)"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v
