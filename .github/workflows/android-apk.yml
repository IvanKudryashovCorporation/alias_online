name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "buildozer.spec"
      - "main.py"
      - "screens/**"
      - "services/**"
      - "server/**"
      - "ui/**"
      - "image/**"
      - "fonts/**"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 150
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Verify Java
        run: |
          java -version
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Cache Buildozer and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', '.github/workflows/android-apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install "cython==0.29.36" buildozer

      - name: Inject global room server URL
        env:
          ALIAS_ROOM_SERVER_URL: ${{ secrets.ALIAS_ROOM_SERVER_URL }}
        run: |
          if [ -n "$ALIAS_ROOM_SERVER_URL" ]; then
            mkdir -p data
            printf "%s\n" "$ALIAS_ROOM_SERVER_URL" > data/room_server_url.txt
            echo "Using global room server URL from repository secret."
          else
            echo "ALIAS_ROOM_SERVER_URL is not set, fallback URL config will be used."
          fi

      - name: Inject SMTP config for mobile email verification
        env:
          ALIAS_SMTP_EMAIL: ${{ secrets.ALIAS_SMTP_EMAIL }}
          ALIAS_SMTP_APP_PASSWORD: ${{ secrets.ALIAS_SMTP_APP_PASSWORD }}
          ALIAS_SMTP_HOST: ${{ secrets.ALIAS_SMTP_HOST }}
          ALIAS_SMTP_PORT: ${{ secrets.ALIAS_SMTP_PORT }}
        run: |
          if [ -n "$ALIAS_SMTP_APP_PASSWORD" ]; then
            mkdir -p data
            SMTP_EMAIL_VALUE="${ALIAS_SMTP_EMAIL:-aliasgameonline@gmail.com}"
            SMTP_HOST_VALUE="${ALIAS_SMTP_HOST:-smtp.gmail.com}"
            SMTP_PORT_VALUE="${ALIAS_SMTP_PORT:-587}"
            cat > data/runtime.env <<EOF
ALIAS_SMTP_EMAIL=${SMTP_EMAIL_VALUE}
ALIAS_SMTP_APP_PASSWORD=${ALIAS_SMTP_APP_PASSWORD}
ALIAS_SMTP_HOST=${SMTP_HOST_VALUE}
ALIAS_SMTP_PORT=${SMTP_PORT_VALUE}
EOF
            echo "Injected data/runtime.env for mobile SMTP fallback."
          else
            echo "ALIAS_SMTP_APP_PASSWORD secret is not set. Mobile local e-mail fallback may be unavailable."
          fi

      - name: Build debug APK
        id: build_step
        shell: bash
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
          if-no-files-found: warn

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: alias-online-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Emit readable failure summary
        if: failure()
        shell: bash
        run: |
          echo "==== Last 120 lines of buildozer.log ===="
          tail -n 120 buildozer.log || true
          echo "========================================="
          MARK_LINE="$(grep -n "Buildozer failed to execute the last command" buildozer.log | tail -n 1 | cut -d: -f1 || true)"
          if [ -n "$MARK_LINE" ]; then
            START_LINE=$((MARK_LINE > 2200 ? MARK_LINE - 2200 : 1))
            CONTEXT="$(sed -n "${START_LINE},$((MARK_LINE-1))p" buildozer.log)"
          else
            CONTEXT="$(tail -n 2200 buildozer.log)"
          fi
          FILTERED="$(printf '%s\n' "$CONTEXT" | sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g' | sed -E '/^# +[A-Za-z_][A-Za-z0-9_]* = /d' | sed '/^[[:space:]]*$/d')"
          printf '%s\n' "$FILTERED" > buildozer-error-context.log
          echo "==== Filtered context before Buildozer failure ===="
          tail -n 240 buildozer-error-context.log || true
          echo "==================================================="
          SUMMARY="$(grep -inE "error|failed|exception|traceback|license|sdkmanager|build-tools|not found|no module named|command failed|aapt|aidl|gradle" buildozer-error-context.log | tail -n 60 || true)"
          if [ -z "$SUMMARY" ]; then
            SUMMARY="$(tail -n 60 buildozer-error-context.log || true)"
          fi
          SUMMARY="${SUMMARY//'%'/'%25'}"
          SUMMARY="${SUMMARY//$'\n'/'%0A'}"
          SUMMARY="${SUMMARY//$'\r'/'%0D'}"
          if [ -n "$SUMMARY" ]; then
            echo "::error::$SUMMARY"
          else
            echo "::error::Buildozer failed. See buildozer.log artifact."
          fi

      - name: Upload error context
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-error-context
          path: buildozer-error-context.log
          if-no-files-found: warn
